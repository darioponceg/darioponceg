<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Dario Ponce profile banner</title>
  <desc id="desc">Dark minimalist profile banner with a financial to data engineering story.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#050816" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)" />
  <circle cx="1020" cy="86" r="120" fill="#38bdf8" opacity="0.08" />
  <circle cx="1080" cy="240" r="150" fill="#22c55e" opacity="0.07" />
  <path d="M80 280 C 250 220, 360 320, 520 250 S 820 160, 1120 230" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.65" />
  <path d="M80 305 C 260 255, 390 345, 560 280 S 840 190, 1120 270" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.28" />
  <text x="80" y="125" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Dario Ponce</text>
  <text x="80" y="175" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">Finance background, data-driven shift, engineering discipline</text>
  <text x="80" y="228" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Python  |  SQL  |  Power BI  |  C  |  C++  |  Git  |  Jupyter</text>
  <rect x="80" y="252" width="220" height="48" rx="24" fill="#0f172a" stroke="#334155" />
  <text x="190" y="283" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">Profiling data and AI</text>
</svg>